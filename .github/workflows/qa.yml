name: QA - Rendering Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    timeout-minutes: 15
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build application
        run: npm run build
        env:
          # Provide dummy env vars for build (actual values not needed for rendering tests)
          VITE_PRIVY_APP_ID: ${{ secrets.VITE_PRIVY_APP_ID || 'test-app-id' }}

      - name: Run rendering tests
        run: npm run test:rendering
        env:
          CI: true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload screenshots on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: screenshots
          path: test-results/
          retention-days: 7

  # Notify on failure
  notify:
    needs: test
    runs-on: ubuntu-latest
    if: failure()
    steps:
      - name: Test failed notification
        run: |
          echo "QA rendering tests failed! Check the workflow for details."
          echo "This blocks deployment to production."
